<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sky background -->
  <defs>
    <radialGradient id="birdGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff7c7c"/>
      <stop offset="100%" stop-color="#e63946"/>
    </radialGradient>
    <radialGradient id="skyGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#87ceeb"/>
      <stop offset="100%" stop-color="#4a9eca"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#skyGrad)"/>

  <!-- Ground -->
  <ellipse cx="32" cy="56" rx="30" ry="10" fill="#5a9e3a"/>

  <!-- Bird body -->
  <circle cx="32" cy="30" r="16" fill="url(#birdGrad)"/>

  <!-- Feather crest -->
  <ellipse cx="28" cy="15" rx="3" ry="6" fill="#cc2a35" transform="rotate(-20 28 15)"/>
  <ellipse cx="32" cy="13" rx="3" ry="7" fill="#e63946"/>
  <ellipse cx="36" cy="15" rx="3" ry="6" fill="#cc2a35" transform="rotate(20 36 15)"/>

  <!-- Eye white -->
  <circle cx="37" cy="28" r="6" fill="white"/>
  <!-- Pupil -->
  <circle cx="38.5" cy="29" r="3" fill="#222"/>
  <!-- Eye shine -->
  <circle cx="39.5" cy="27.5" r="1" fill="white"/>

  <!-- Angry eyebrow -->
  <path d="M31 22 Q36 20 41 23" stroke="#cc2a35" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Beak -->
  <path d="M40 33 L46 35 L40 38 Z" fill="#f4a237"/>
  <line x1="40" y1="35.5" x2="46" y2="35" stroke="#e08010" stroke-width="0.8"/>
</svg>
